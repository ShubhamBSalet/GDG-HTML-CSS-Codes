<!DOCTYPE html>
<html>
<head>
    <title>Position Property</title>

    <style>

        .box {
            width: 120px;
            height: 60px;
            color: white;
            text-align: center;
            line-height: 60px;
        }

        .static {
            position: static;
            background: gray;
        }

        .relative {
            position: relative;
            left: 20px;
            background: blue;
        }

        .absolute {
            position: absolute;
            top: 50px;
            left: 200px;
            background: red;
        }

        .fixed {
            position: fixed;
            top: 10px;
            right: 10px;
            background: green;
        }

        .sticky {
            position: sticky;
            top: 0;
            background: orange;
        }

    </style>

</head>
<body>

<h2>Position Property Example</h2>

<div class="box static">Static</div>

<div class="box relative">Relative</div>

<div class="box absolute">Absolute</div>

<div class="box fixed">Fixed</div>

<div class="box sticky">Sticky</div>

<p style="height:1000px">
Scroll to see sticky and fixed effect
</p>

</body>
</html>
