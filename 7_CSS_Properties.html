<!DOCTYPE html>
<html>
<head>
    <title>CSS Properties</title>

    <style>
        body {
            background-color: lightgray;
            font-family: Arial;
        }

        h1 {
            color: blue;
            text-align: center;
        }

        p {
            color: black;
            font-size: 18px;
        }

        div {
            width: 300px;
            height: 150px;
            background-color: white;
            border: 2px solid black;
            padding: 10px;
            margin: 20px;
        }

        button {
            color: white;
            background-color: green;
            padding: 10px;
            border: none;
        }
    </style>

</head>
<body>

<h1>CSS Properties Example</h1>

<p>This is paragraph with CSS styling.</p>

<div>
    This is a box using CSS properties.
</div>

<button>Click Me</button>

</body>
</html>
