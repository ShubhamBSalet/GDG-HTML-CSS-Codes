<!DOCTYPE html>
<html>
<head>
    <title>Flexbox Example</title>

    <style>
        .container {
            display: flex;
            background-color: lightgray;

            justify-content: space-around; 
            align-items: center;

            height: 200px;
        }

        .box {
            width: 80px;
            height: 80px;
            background-color: blue;
            color: white;
            text-align: center;
            line-height: 80px;
            font-size: 20px;
        }
    </style>

</head>
<body>

<h2>Flexbox Example</h2>

<div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
</div>

</body>
</html>
